<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ArcadeHeaven Match</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; touch-action:none; overscroll-behavior:none; }
  body {
    font-family:'Hiragino Maru Gothic ProN','BIZ UDGothic','Yu Gothic',sans-serif;
    background:linear-gradient(180deg,#ffd5ea 0%,#ded5ff 46%,#c9f1dc 100%);
    user-select:none; -webkit-user-select:none;
    position:fixed; inset:0;
  }
  .cloud {
    display:none;
    position:absolute; background:rgba(255,255,255,.85); border-radius:50px;
    filter:blur(1px); animation:floaty 14s ease-in-out infinite alternate; z-index:0;
  }
  .cloud::before,.cloud::after {
    content:""; position:absolute; background:inherit; border-radius:50%;
  }
  .cloud::before { width:60%; height:140%; left:12%; top:-60%; }
  .cloud::after  { width:45%; height:110%; right:12%; top:-40%; }
  @keyframes floaty { from{transform:translateX(-12px)} to{transform:translateX(14px)} }

  #hud {
    position:absolute; top:env(safe-area-inset-top,0); left:0; right:0;
    display:flex; justify-content:center; align-items:center; align-content:flex-start;
    flex-wrap:wrap; gap:6px;
    padding:10px 8px 6px; z-index:5; pointer-events:none;
  }
  .stat {
    background:rgba(255,255,255,.75); border:3px solid #fff;
    border-radius:18px; padding:4px 8px; text-align:center; min-width:62px;
    box-shadow:0 3px 8px rgba(180,140,200,.25);
  }
  .stat .label { font-size:11px; color:#b08bc9; font-weight:bold; }
  .stat .val   { font-size:19px; color:#7a5ea8; font-weight:bold; }
  .stat:nth-child(2) { min-width:92px; }
  .stat:nth-child(4) { min-width:90px; }
  .hud-btn {
    pointer-events:auto;
    width:42px; height:42px; min-width:42px;
    padding:0; border-radius:50%;
    font-size:18px; line-height:42px;
    box-shadow:0 4px 0 #e873a8, 0 7px 12px rgba(230,120,170,.32);
  }
  @media (max-width:480px) {
    #hud {
      display:grid;
      grid-template-columns:50px 86px 50px 74px 38px;
      grid-template-areas:
        "stage score time life mute"
        ". . . . pause";
      justify-content:center; align-items:start;
      padding:7px 4px 4px; gap:4px;
    }
    .stat {
      width:auto; min-width:0;
      padding:3px 4px; border-width:2px; border-radius:14px;
    }
    .stat:nth-child(1) { grid-area:stage; }
    .stat:nth-child(2) { grid-area:score; min-width:0; }
    .stat:nth-child(3) { grid-area:time; }
    .stat:nth-child(4) { grid-area:life; min-width:0; }
    .stat .label { font-size:9.5px; line-height:1.15; }
    .stat .val { font-size:15.5px; line-height:1.18; white-space:nowrap; }
    .hud-btn { width:38px; height:38px; min-width:38px; font-size:16px; line-height:38px; }
    #btn-mute { grid-area:mute; }
    #btn-pause { grid-area:pause; }
  }

  canvas { position:absolute; inset:0; z-index:2; }

  .overlay {
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(255,240,250,.55); backdrop-filter:blur(5px);
    text-align:center; padding:20px; gap:14px;
  }
  #title {
    background:rgba(0,0,0,.38);
    backdrop-filter:none;
    overflow:hidden;
  }
  #title::before {
    content:"";
    position:absolute; inset:0; z-index:0;
    background:
      linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.16)),
      url("Asset/%E9%BB%92%E8%83%8C%E6%99%AF.png") center center / cover no-repeat,
      #000;
    pointer-events:none;
    animation:titleSplashOut .45s ease 2s forwards;
  }
  .title-screen {
    position:absolute; inset:0; z-index:1;
    opacity:0; pointer-events:none;
    animation:titleScreenIn .35s ease 2s forwards;
  }
  #title.title-ready .title-screen { pointer-events:auto; }
  .title-screen img.title-art {
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .title-play {
    position:absolute; left:50%; bottom:5.5%;
    width:min(62vw,380px); aspect-ratio:976/360;
    transform:translateX(-50%);
    padding:0; border:0; border-radius:999px; overflow:visible;
    background:transparent; box-shadow:none;
    cursor:pointer; pointer-events:auto;
    filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
  }
  .title-play img {
    position:absolute; left:50%; top:50%;
    width:100%; height:100%; object-fit:contain;
    transform:translate(-50%,-50%);
    display:block;
  }
  .title-play:active { transform:translateX(-50%) translateY(3px); box-shadow:none; }
  #title .panel {
    position:relative; z-index:2;
    opacity:0;
    pointer-events:none;
    transform:translateY(10px) scale(.98);
    transition:opacity .28s ease, transform .28s ease;
  }
  #title.show-tutorial .title-screen {
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
    animation:none;
  }
  #title.show-tutorial .panel {
    opacity:1;
    pointer-events:auto;
    transform:translateY(0) scale(1);
  }
  .overlay.hidden { display:none; }
  .panel {
    background:rgba(255,255,255,.92); border:4px solid #ffd2ea;
    border-radius:28px; padding:22px 26px; max-width:340px; width:90%;
    box-shadow:0 10px 30px rgba(170,120,190,.3);
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  h2 { font-size:24px; color:#9b6fc9; text-shadow:0 2px 0 #fff; }
  .sub { font-size:13px; color:#c08cc0; font-weight:bold; }
  #clear .panel { gap:12px; }
  #clear-chara {
    position:static;
    inset:auto;
    z-index:auto;
    display:block;
    flex:0 0 auto;
  }
  .big-score { font-size:30px; color:#ff8fc0; font-weight:bold; }
  .best { font-size:13px; color:#b09ace; }
  #over-score {
    width:100%;
    white-space:nowrap;
    font-size:clamp(22px,7vw,30px);
    line-height:1.15;
  }
  .menu-actions { display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; }
  .volume-control {
    width:100%;
    display:flex; align-items:center; gap:10px;
    padding:6px 2px;
    color:#9b6fc9; font-size:13px; font-weight:bold;
  }
  .volume-control input { flex:1; accent-color:#ff8fc0; }
  #volume-value { min-width:38px; text-align:right; color:#7a5ea8; }
  #volume-panel {
    position:fixed; right:10px; top:calc(env(safe-area-inset-top,0px) + 58px);
    z-index:8; width:min(72vw,240px);
    padding:12px;
    background:rgba(255,255,255,.95);
    border:3px solid #ffd2ea;
    border-radius:18px;
    box-shadow:0 10px 28px rgba(170,120,190,.32);
    pointer-events:auto;
  }
  #volume-panel.hidden { display:none; }
  #volume-panel .volume-control { padding:0 0 8px; }
  #btn-volume-mute {
    width:100%; padding:9px 16px; font-size:15px;
    box-shadow:0 4px 0 #e873a8, 0 7px 12px rgba(230,120,170,.28);
  }
  @media (max-width:480px) {
    #volume-panel {
      top:auto; right:50%; bottom:max(14px,env(safe-area-inset-bottom,0px));
      transform:translateX(50%);
      width:min(88vw,320px);
      padding:10px;
    }
    #volume-panel .volume-control { padding-bottom:7px; }
    #btn-volume-mute { padding:8px 14px; }
  }
  button {
    font-family:inherit; font-size:20px; font-weight:bold; color:#fff;
    background:linear-gradient(180deg,#ffb1d8,#ff8fc0);
    border:none; border-radius:999px; padding:13px 48px;
    box-shadow:0 5px 0 #e873a8, 0 8px 14px rgba(230,120,170,.4);
    cursor:pointer; transition:transform .08s;
  }
  button:active { transform:translateY(4px); box-shadow:0 1px 0 #e873a8; }
  button.secondary-btn {
    background:linear-gradient(180deg,#c9b5ff,#a88cf2);
    box-shadow:0 5px 0 #8c72d6, 0 8px 14px rgba(140,110,210,.34);
  }
  button.secondary-btn:active { box-shadow:0 1px 0 #8c72d6; }
  .chara-pop { animation:charabounce 1s ease-in-out infinite; filter:drop-shadow(0 6px 10px rgba(170,120,190,.3)); }
  .privacy-banner {
    position:fixed; left:50%; bottom:max(12px,env(safe-area-inset-bottom,0px));
    transform:translateX(-50%);
    z-index:30;
    width:min(92vw,560px);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:10px 12px 10px 14px;
    background:rgba(18,14,44,.88);
    color:#fff;
    border:1px solid rgba(255,255,255,.28);
    border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
    font-size:12px; line-height:1.45; text-align:left;
  }
  .privacy-banner.hidden { display:none; }
  .privacy-banner button {
    flex:0 0 auto;
    font-size:13px;
    padding:8px 14px;
    border-radius:999px;
    box-shadow:none;
    background:linear-gradient(180deg,#ffe375,#ffb82e);
    color:#5b3300;
  }
  .privacy-banner .privacy-actions {
    display:flex; flex:0 0 auto; gap:8px;
  }
  .privacy-banner button.decline {
    background:rgba(255,255,255,.14);
    color:#fff;
    border:1px solid rgba(255,255,255,.35);
  }
  .privacy-banner button:active { transform:translateY(2px); box-shadow:none; }
  @keyframes titleSplashOut { to{ opacity:0; } }
  @keyframes titleScreenIn { to{ opacity:1; } }
  @keyframes charabounce { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-10px) rotate(3deg)} }
</style>
</head>
<body>
  <div class="cloud" style="width:120px;height:34px;top:9%;left:6%;"></div>
  <div class="cloud" style="width:90px;height:26px;top:16%;right:8%;animation-delay:-6s;"></div>
  <div class="cloud" style="width:70px;height:22px;top:5%;right:30%;animation-delay:-10s;"></div>

  <div id="hud" style="display:none;">
    <div class="stat"><div class="label">ステージ</div><div class="val" id="hud-level">1</div></div>
    <div class="stat"><div class="label">スコア / もくひょう</div><div class="val" id="hud-score">0 / 1200</div></div>
    <div class="stat"><div class="label">じかん</div><div class="val" id="hud-time">60</div></div>
    <div class="stat"><div class="label">ライフ</div><div class="val" id="hud-lives">♥♥♥♥♥</div></div>
    <button id="btn-mute" class="hud-btn" type="button" aria-label="音のオン・オフ">🔊</button>
    <button id="btn-pause" class="hud-btn" type="button" aria-label="一時停止">Ⅱ</button>
  </div>

  <div id="volume-panel" class="hidden">
    <label class="volume-control" for="bgm-volume">
      <span>BGM</span>
      <input id="bgm-volume" type="range" min="0" max="100" value="28">
      <span id="volume-value">28%</span>
    </label>
    <button id="btn-volume-mute" type="button">ミュート</button>
  </div>

  <audio id="bgm" src="Asset/BGM.mp3" loop preload="auto"></audio>
  <canvas id="game"></canvas>

  <div id="title" class="overlay">
    <div class="title-screen">
      <img class="title-art" src="Asset/Title.png" alt="">
      <button id="btn-title-play" class="title-play" type="button" aria-label="Play">
        <img src="Asset/TAPTOSTART-display.png" alt="">
      </button>
    </div>
    <div class="panel">
      <div class="best" id="title-best"></div>
      <button id="btn-start">はじめる</button>
    </div>
  </div>

  <div id="clear" class="overlay hidden">
    <div class="panel">
      <h2>ステージクリア！</h2>
      <canvas id="clear-chara" class="chara-pop" width="320" height="320" style="width:180px;height:180px;display:none;"></canvas>
      <div class="big-score" id="clear-score"></div>
      <button id="btn-next">つぎへすすむ</button>
    </div>
  </div>

  <div id="gameover" class="overlay hidden">
    <div class="panel">
      <h2>おつかれさま</h2>
      <div class="sub">もくひょうにとどかなかったよ</div>
      <div class="big-score" id="over-score"></div>
      <div class="best" id="over-best"></div>
      <button id="btn-retry">もういちど</button>
    </div>
  </div>

  <div id="pause" class="overlay hidden">
    <div class="panel">
      <h2>いちじていし</h2>
      <div class="menu-actions">
        <button id="btn-resume">つづける</button>
        <button id="btn-title-back" class="secondary-btn">タイトルにもどる</button>
      </div>
    </div>
  </div>

  <div id="practice-clear" class="overlay hidden">
    <div class="panel">
      <h2>チュートリアル完了！</h2>
      <div class="sub">スターで上下左右を消せたよ</div>
      <button id="btn-practice-start">ゲームスタート</button>
    </div>
  </div>

  <div id="privacy-banner" class="privacy-banner hidden">
    <span>AIRIS GAMESは、サービス向上・広告配信のためGoogle Analytics・AdSenseを使用します。同意すると解析・広告Cookieが有効になります。</span>
    <div class="privacy-actions">
      <button id="btn-privacy-accept" type="button">同意する</button>
      <button id="btn-privacy-decline" class="decline" type="button">同意しない</button>
    </div>
  </div>

<script>
"use strict";
//================ Basic Settings ================
const COLS = 7, ROWS = 8, NTYPES = 5;
const BELL = 9; // special tile
const SWAP_T = 0.14, CLEAR_T = 0.26;
const GRAV = 4200;

const PAL = [
  { petal:"#ff8fc8" }, // chara1: pink
  { petal:"#74cfff" }, // chara2: light blue
  { petal:"#9be44f" }, // chara3: green
  { petal:"#ff5252" }, // chara4: red
  { petal:"#b76cff" }  // chara5: purple
];

const cv = document.getElementById("game");
const ctx = cv.getContext("2d");
let W=0, H=0, DPR=1;
let cs=0, bx=0, by=0;       // cell size and board origin
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const hud = document.getElementById("hud");
  const hudH = hud && hud.style.display!=="none" ? hud.offsetHeight : 76;
  const topPad = Math.max(86, hudH + 12), botPad = 24;
  cs = Math.floor(Math.min((W-16)/COLS, (H-topPad-botPad)/ROWS));
  bx = (W - cs*COLS)/2;
  by = topPad + (H-topPad-botPad - cs*ROWS)/2;
}
window.addEventListener("resize", resize);
resize();

//================ Sound ================
let AC = null;
const bgm = document.getElementById("bgm");
let muted = localStorage.getItem("ohanapon-muted")==="1";
let bgmVolume = Math.min(1, Math.max(0, +(localStorage.getItem("ohanapon-bgm-volume")||0.28)));
function syncVolumeUI(){
  const slider=document.getElementById("bgm-volume");
  const label=document.getElementById("volume-value");
  const pct=Math.round(bgmVolume*100);
  if(slider) slider.value = String(pct);
  if(label) label.textContent = pct+"%";
  if(bgm) bgm.volume = bgmVolume;
}
function applyMuted(){
  if(bgm) bgm.muted = muted;
  const b=document.getElementById("btn-mute");
  if(b) b.textContent = muted ? "🔇" : "🔊";
  const mb=document.getElementById("btn-volume-mute");
  if(mb) mb.textContent = muted ? "ミュート解除" : "ミュート";
  syncVolumeUI();
}
function toggleVolumePanel(){
  const panel=document.getElementById("volume-panel");
  if(!panel) return;
  syncVolumeUI();
  panel.classList.toggle("hidden");
}
function hideVolumePanel(){
  const panel=document.getElementById("volume-panel");
  if(panel) panel.classList.add("hidden");
}
function toggleMute(){
  muted = !muted;
  localStorage.setItem("ohanapon-muted", muted ? "1" : "0");
  applyMuted();
  if(muted) pauseBgm();
  else if(state!=="title" && state!=="over" && state!=="paused") playBgm();
}
function audio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==="suspended") AC.resume(); }
function playBgm(){
  if(!bgm || muted) return;
  bgm.volume = bgmVolume;
  bgm.play().catch(()=>{});
}
function pauseBgm(){
  if(bgm) bgm.pause();
}
function stopBgm(){
  if(!bgm) return;
  bgm.pause();
  bgm.currentTime = 0;
}
function tone(freq, dur, type, vol, when){
  if(!AC || muted) return;
  const t = AC.currentTime + (when||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type||"sine"; o.frequency.value = freq;
  g.gain.setValueAtTime(vol||0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+dur);
}
const PENTA = [523, 587, 659, 784, 880, 1047, 1175, 1319];
function sndSwap(){ tone(330,.08,"triangle",.08); }
function sndDeny(){ tone(180,.12,"square",.06); }
function sndClear(combo){
  const i = Math.min(combo-1, 5);
  tone(PENTA[i],.18,"sine",.16); tone(PENTA[i+2],.22,"sine",.1,.05);
}
function sndBell(){ tone(1568,.4,"triangle",.14); tone(2093,.5,"triangle",.1,.06); }
function sndClearStage(){ [0,2,4,5].forEach((n,i)=>tone(PENTA[n],.3,"sine",.14,i*.12)); }
function sndLose(){ tone(392,.25,"sine",.12); tone(311,.35,"sine",.12,.2); }
function sndHorror(){ tone(72,.7,"sawtooth",.13); tone(67,.7,"sawtooth",.13,.02); tone(45,.9,"sine",.18,.05); }

//================ Game State ================
let board = [];     // board[r][c] = {t, offY, vy, scale, pop} | null
let state = "title"; // title, idle, swap, swapback, clear, fall, practiceDone, paused, over
let level=1, score=0, target=0, timeLeft=0, lives=5, combo=1;
let best = +(localStorage.getItem("ohanapon-best")||0);
let swapInfo = null;   // {r1,c1,r2,c2,t}
let pausedState = null;
let clearTimer = 0, clearSet = null, bellSpawns = null;
let particles = [], floats = [];
let selected = null;
let idleTime = 0, hint = null;
let shakeT = 0;
let misses = 0, horror = false;
let practiceMode = false;
let practiceStep = 1;
let practiceStarUsed = false;
const PRACTICE_SWAPS = {
  1: [[3,3],[3,4]],
  2: [[4,3],[3,3]],
  3: [[3,3],[3,4]]
};
const CHARA_PATHS = [
  "Asset/chara1_sub.PNG",
  "Asset/chara2_sub.PNG",
  "Asset/chara3_sub.PNG",
  "Asset/chara4_sub.PNG",
  "Asset/chara5_sub.PNG"
];
const charaImgs = [];
if(typeof Image !== "undefined"){
  for(const src of CHARA_PATHS){
    const img = new Image();
    img.src = src;
    charaImgs.push(img);
  }
}
function imgReady(img){ return img && img.complete && img.naturalWidth; }
function readyCharas(){ return charaImgs.filter(imgReady); }
function drawContainedImage(g,img,cx,cy,maxW,maxH,alpha,flip){
  if(!imgReady(img)) return false;
  const sc = Math.min(maxW/img.naturalWidth, maxH/img.naturalHeight);
  const w = img.naturalWidth*sc, h = img.naturalHeight*sc;
  g.save();
  g.globalAlpha = alpha===undefined ? 1 : alpha;
  g.shadowColor = "rgba(80,50,120,.28)";
  g.shadowBlur = Math.max(8, h*0.08);
  g.shadowOffsetY = Math.max(4, h*0.04);
  if(flip){
    g.translate(cx,cy);
    g.scale(-1,1);
    g.drawImage(img,-w/2,-h/2,w,h);
  } else {
    g.drawImage(img,cx-w/2,cy-h/2,w,h);
  }
  g.restore();
  return true;
}
function newTile(t){ return { t:(t===undefined? (Math.random()*NTYPES|0) : t), offY:0, vy:0, scale:1, pop:0 }; }

function buildBoard(){
  do {
    board = [];
    for(let r=0;r<ROWS;r++){
      const row=[];
      for(let c=0;c<COLS;c++){
        let t;
        do { t = Math.random()*NTYPES|0; }
        while( (c>=2 && row[c-1].t===t && row[c-2].t===t) ||
               (r>=2 && board[r-1][c].t===t && board[r-2][c].t===t) );
        row.push(newTile(t));
      }
      board.push(row);
    }
  } while(!findAnyMove());
}

function buildPracticeBoard(step){
  const types = step===3 ? [
    [0,1,2,3,4,0,1],
    [1,2,3,4,0,1,2],
    [2,3,4,0,1,2,3],
    [3,0,0,1,2,4,2],
    [4,1,2,3,4,0,1],
    [0,2,3,4,0,1,2],
    [1,3,4,0,1,2,3],
    [2,4,0,1,2,3,4]
  ] : step===2 ? [
    [0,1,2,3,4,0,1],
    [1,2,3,4,0,1,2],
    [2,3,4,0,1,2,3],
    [3,1,1,2,1,4,0],
    [4,2,3,1,0,2,1],
    [0,3,4,0,1,3,2],
    [1,4,0,1,2,4,3],
    [2,0,1,2,3,0,4]
  ] : [
    [0,1,2,3,4,0,1],
    [1,2,3,4,0,1,2],
    [2,3,4,0,1,2,3],
    [3,0,0,1,0,4,2],
    [4,1,2,3,4,0,1],
    [0,2,3,4,0,1,2],
    [1,3,4,0,1,2,3],
    [2,4,0,1,2,3,4]
  ];
  board = types.map(row => row.map(t => newTile(t)));
  if(step===3){
    board[3][3] = newTile(BELL);
    board[3][3].pop = 0.45;
  }
}

//================ Match Detection ================
function findRuns(){
  const runs = [];
  for(let r=0;r<ROWS;r++){
    let c=0;
    while(c<COLS){
      const t0 = board[r][c] && board[r][c].t;
      if(t0===null||t0===undefined||t0===BELL){ c++; continue; }
      let e=c; while(e+1<COLS && board[r][e+1] && board[r][e+1].t===t0) e++;
      if(e-c>=2){ const run=[]; for(let i=c;i<=e;i++) run.push([r,i]); runs.push(run); }
      c=e+1;
    }
  }
  for(let c=0;c<COLS;c++){
    let r=0;
    while(r<ROWS){
      const t0 = board[r][c] && board[r][c].t;
      if(t0===null||t0===undefined||t0===BELL){ r++; continue; }
      let e=r; while(e+1<ROWS && board[e+1][c] && board[e+1][c].t===t0) e++;
      if(e-r>=2){ const run=[]; for(let i=r;i<=e;i++) run.push([i,c]); runs.push(run); }
      r=e+1;
    }
  }
  return runs;
}

function wouldMatch(r,c){
  const t = board[r][c].t; if(t===BELL) return true;
  let n=1;
  for(let i=c-1;i>=0&&board[r][i]&&board[r][i].t===t;i--)n++;
  for(let i=c+1;i<COLS&&board[r][i]&&board[r][i].t===t;i++)n++;
  if(n>=3) return true;
  n=1;
  for(let i=r-1;i>=0&&board[i][c]&&board[i][c].t===t;i--)n++;
  for(let i=r+1;i<ROWS&&board[i][c]&&board[i][c].t===t;i++)n++;
  return n>=3;
}

function findAnyMove(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(board[r][c].t===BELL) return [r,c,r,c];
    for(const [dr,dc] of [[0,1],[1,0]]){
      const r2=r+dr, c2=c+dc;
      if(r2>=ROWS||c2>=COLS) continue;
      const a=board[r][c], b=board[r2][c2];
      board[r][c]=b; board[r2][c2]=a;
      const ok = wouldMatch(r,c)||wouldMatch(r2,c2);
      board[r][c]=a; board[r2][c2]=b;
      if(ok) return [r,c,r2,c2];
    }
  }
  return null;
}

//================ Swap ================
function trySwap(r1,c1,r2,c2){
  if(state!=="idle") return;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return;
  if(practiceMode && !isPracticeSwap(r1,c1,r2,c2)){
    sndDeny();
    selected = null;
    const ps = PRACTICE_SWAPS[practiceStep];
    hint = [ps[0][0],ps[0][1],ps[1][0],ps[1][1]];
    floats.push({x:bx+cs*COLS/2,y:by-cs*0.2,txt:"光っているタイルを動かしてね",life:1,color:"#9b6fc9",size:18});
    return;
  }
  audio();
  swapInfo = {r1,c1,r2,c2,t:0,back:false};
  state="swap"; sndSwap();
  selected=null; hint=null; idleTime=0;
}

function isPracticeSwap(r1,c1,r2,c2){
  const [a,b]=PRACTICE_SWAPS[practiceStep];
  return (r1===a[0]&&c1===a[1]&&r2===b[0]&&c2===b[1]) ||
         (r1===b[0]&&c1===b[1]&&r2===a[0]&&c2===a[1]);
}

function commitSwap(){
  const {r1,c1,r2,c2} = swapInfo;
  const a=board[r1][c1], b=board[r2][c2];
  board[r1][c1]=b; board[r2][c2]=a;

  if(a.t===BELL || b.t===BELL){
    const cells = new Set();
    if(a.t===BELL && b.t===BELL){
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) cells.add(r+","+c);
      shakeT=.4;
    } else {
      const br = (a.t===BELL)? r2:r1, bc = (a.t===BELL)? c2:c1;
      bellBlast(br,bc,cells);
    }
    sndBell();
    if(practiceMode && practiceStep===3) practiceStarUsed = true;
    startClear(cells, []);
    return;
  }

  const runs = findRuns();
  if(runs.length===0){
    swapInfo.t=0; swapInfo.back=true;
    board[r1][c1]=a; board[r2][c2]=b;
    state="swapback"; sndDeny();
    return;
  }
  if(practiceMode){
    practiceComplete(runs);
    return;
  }
  resolveRuns(runs, [r2,c2], [r1,c1]);
}

function bellBlast(br,bc,cells){
  const queue=[[br,bc]]; cells.add(br+","+bc);
  while(queue.length){
    const [r,c]=queue.pop();
    for(let i=0;i<COLS;i++) addBlast(r,i);
    for(let i=0;i<ROWS;i++) addBlast(i,c);
  }
  function addBlast(r,c){
    const k=r+","+c;
    if(cells.has(k)) return;
    cells.add(k);
    if(board[r][c] && board[r][c].t===BELL) queue.push([r,c]);
  }
  shakeT=.25;
}

function resolveRuns(runs, prefPos, prefPos2){
  const cells = new Set();
  const bells = [];
  for(const run of runs){
    for(const [r,c] of run) cells.add(r+","+c);
    if(run.length>=4){
      let pos = run.find(([r,c]) => (prefPos && r===prefPos[0]&&c===prefPos[1]) || (prefPos2 && r===prefPos2[0]&&c===prefPos2[1]));
      if(!pos) pos = run[run.length>>1];
      bells.push(pos);
    }
  }
  for(const [r,c] of bells) cells.delete(r+","+c);
  // Chain-react special tiles caught in the clear set.
  for(const k of [...cells]){
    const [r,c]=k.split(",").map(Number);
    if(board[r][c]&&board[r][c].t===BELL){ bellBlast(r,c,cells); sndBell(); }
  }
  startClear(cells, bells);
}

//================ Clear And Drop ================
function startClear(cells, bells){
  clearSet = cells; bellSpawns = bells; clearTimer = 0;
  let n=0;
  for(const k of cells){
    const [r,c]=k.split(",").map(Number);
    const tile=board[r][c]; if(!tile) { continue; }
    n++;
    const x=bx+c*cs+cs/2, y=by+r*cs+cs/2+tile.offY;
    spawnParticles(x,y, tile.t);
  }
  const gain = n*15*combo;
  score += gain;
  if(n>0){
    const cx = bx+cs*COLS/2;
    floats.push({x:cx, y:by+cs*ROWS*0.35, txt:"+"+gain, life:0.9, color:"#ff7eb6", size:Math.min(34,20+combo*3)});
    if(combo>=2) floats.push({x:cx, y:by+cs*ROWS*0.35-34, txt:combo+" COMBO!", life:1, color:"#9b6fc9", size:22});
    sndClear(combo);
  }
  updateHUD();
  state="clear";
}

function finishClear(){
  for(const k of clearSet){
    const [r,c]=k.split(",").map(Number);
    board[r][c]=null;
  }
  for(const [r,c] of bellSpawns){
    board[r][c]=newTile(BELL); board[r][c].pop=0.35;
  }
  // Drop existing tiles down.
  for(let c=0;c<COLS;c++){
    let write=ROWS-1;
    for(let r=ROWS-1;r>=0;r--){
      if(board[r][c]){
        if(write!==r){
          board[write][c]=board[r][c];
          board[write][c].offY -= (write-r)*cs;
          board[r][c]=null;
        }
        write--;
      }
    }
    for(let r=write;r>=0;r--){
      board[r][c]=newTile();
      board[r][c].offY = -(write+1)*cs - cs*0.3;
      board[r][c].vy = 0;
    }
  }
  state="fall";
}

function afterFall(){
  const runs = findRuns();
  if(runs.length){
    combo++;
    resolveRuns(runs, null, null);
    return;
  }
  combo=1;
  if(practiceMode && practiceStep===3 && practiceStarUsed){
    finishPracticeStar();
    return;
  }
  if(score>=target){ stageClear(); return; }
  if(!findAnyMove()){
    floats.push({x:W/2,y:H/2,txt:"SHUFFLE!",life:1.2,color:"#9b6fc9",size:26});
    buildBoard();
  }
  idleTime=0; hint=null;
  state="idle";
}

  practiceMode = false;
  practiceStarUsed = false;
  state = "practiceDone";
  selected = null;
  hint = null;
  floats.push({x:bx+cs*COLS/2,y:by+cs*2,txt:"すごい！",life:1.1,color:"#ff7eb6",size:30});

function practiceComplete(runs){
  const completedStep = practiceStep;
  state = "practiceDone";
  swapInfo = null;
  selected = null;
  hint = null;
  for(const run of runs){
    for(const [r,c] of run){
      const tile=board[r][c];
      if(!tile) continue;
      spawnParticles(bx+c*cs+cs/2, by+r*cs+cs/2, tile.t);
    }
  }
  floats.push({x:bx+cs*COLS/2,y:by+cs*2,txt:completedStep===1?"できた！":"スター完成！",life:1.2,color:"#ff7eb6",size:30});
  if(completedStep===1){
    setTimeout(()=>startPracticeStep(2), 800);
    return;
  }
  const starRun = runs.find(run => run.length>=4) || runs[0];
  const [r,c] = starRun[Math.min(2,starRun.length-1)];
  board[r][c] = newTile(BELL);
  board[r][c].pop = 0.45;
  sndBell();
  setTimeout(()=>startPracticeStep(3), 900);
}

let touchStart=null;
function cellFromXY(x,y){
  const c=Math.floor((x-bx)/cs), r=Math.floor((y-by)/cs);
  return (r>=0&&r<ROWS&&c>=0&&c<COLS)? [r,c] : null;
}
cv.addEventListener("pointerdown", e=>{
  audio();
  if(state!=="idle") return;
  const cell=cellFromXY(e.clientX,e.clientY);
  if(!cell) { selected=null; return; }
  if(selected && Math.abs(selected[0]-cell[0])+Math.abs(selected[1]-cell[1])===1){
    trySwap(selected[0],selected[1],cell[0],cell[1]);
    touchStart=null;
    return;
  }
  selected=cell;
  touchStart={x:e.clientX,y:e.clientY,cell};
});
cv.addEventListener("pointermove", e=>{
  if(!touchStart || state!=="idle") return;
  const dx=e.clientX-touchStart.x, dy=e.clientY-touchStart.y;
  if(Math.hypot(dx,dy) < cs*0.35) return;
  const [r,c]=touchStart.cell;
  let r2=r,c2=c;
  if(Math.abs(dx)>Math.abs(dy)) c2 += dx>0?1:-1; else r2 += dy>0?1:-1;
  touchStart=null;
  if(r2<0||r2>=ROWS||c2<0||c2>=COLS) return;
  trySwap(r,c,r2,c2);
});
cv.addEventListener("pointerup", ()=>{ touchStart=null; });

      r:2+Math.random()*4, heart:Math.random()<.3});

}

}

// タイル画像はクリア画面と同じキャラ画像(chara*_sub.PNG)を共用
const tileImgs = charaImgs;
function drawImageObject(g,img,x,y,r,scale){
  const R=r*(scale||1.2);
  const sc=Math.min((R*2)/img.naturalWidth,(R*2)/img.naturalHeight);
  const w=img.naturalWidth*sc, h=img.naturalHeight*sc;
  g.save();
  g.shadowColor="rgba(20,40,80,.35)";
  g.shadowBlur=r*0.22;
  g.shadowOffsetY=r*0.08;
  g.drawImage(img,x-w/2,y-h/2,w,h);
  g.restore();
}
const TILE_IMAGE_SCALE=[
  {w:2.65,h:2.52}, // chara1
  {w:2.9,h:2.74},  // chara2: light blue
  {w:2.35,h:2.25}, // chara3
  {w:3.0,h:2.78},  // chara4: red
  {w:3.15,h:2.98}  // chara5: purple
];
function drawTileImageObject(g,img,x,y,r,t){
  const scale=TILE_IMAGE_SCALE[t] || TILE_IMAGE_SCALE[0];
  const maxW=r*scale.w, maxH=r*scale.h;
  const sc=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight);
  const w=img.naturalWidth*sc, h=img.naturalHeight*sc;
  g.save();
  g.shadowColor="rgba(30,20,70,.28)";
  g.shadowBlur=r*0.18;
  g.shadowOffsetY=r*0.08;
  g.drawImage(img,x-w/2,y-h/2,w,h);
  g.restore();
}
function drawObject(g,t,x,y,r){
  if(imgReady(tileImgs[t])) { drawTileImageObject(g,tileImgs[t],x,y,r,t); return; }
  if(t>=0 && t<PAL.length){
    g.save();
    g.fillStyle=PAL[t].petal;
    g.globalAlpha=0.25;
    g.beginPath();
    g.arc(x,y,r*0.65,0,7);
    g.fill();
    g.restore();
  }
}

function drawBell(x,y,r,pulse){
  if(!imgReady(starSpecialImg)) return;
  const glow=0.28+0.12*Math.sin(pulse*6);
  ctx.save();
  ctx.globalAlpha=glow;
  ctx.fillStyle="#fff7a8";
  ctx.beginPath(); ctx.arc(x,y,r*1.12,0,7); ctx.fill();
  ctx.globalAlpha=1;
  drawImageObject(ctx,starSpecialImg,x,y,r,1.2);
  ctx.restore();
}

function drawTile(r,c,tile,x,y,extraScale){
  const sc = tile.scale * (1+tile.pop) * (extraScale||1);
  const cx = x+cs/2, cy = y+cs/2;
  ctx.save();
  ctx.translate(cx,cy); ctx.scale(sc,sc); ctx.translate(-cx,-cy);
  if(tile.t===BELL) drawBell(cx,cy,cs*0.4, perf);
  else drawObject(ctx, tile.t, cx,cy,cs*0.4);
  ctx.restore();
}

function drawPracticeGuide(){
  if(!practiceMode || state!=="idle") return;
  const [a,b]=PRACTICE_SWAPS[practiceStep];
  const message = practiceStep===1 ? "同じタイルを３つそろえて消そう！" :
    practiceStep===2 ? "４つそろえてスターを作ろう！" : "スターを動かして上下左右を消そう！";
  const pulse=0.5+0.5*Math.sin(perf*6);
  ctx.save();
  ctx.lineWidth=4;
  ctx.strokeStyle="rgba(255,122,190,"+(0.78+0.18*pulse)+")";
  ctx.shadowColor="rgba(255,122,190,.55)";
  ctx.shadowBlur=12+8*pulse;
  for(const [r,c] of PRACTICE_SWAPS[practiceStep]){
    rounded(bx+c*cs+5,by+r*cs+5,cs-10,cs-10,12);
    ctx.stroke();
  }
  const ax=bx+a[1]*cs+cs/2, ay=by+a[0]*cs+cs/2;
  const bx2=bx+b[1]*cs+cs/2, by2=by+b[0]*cs+cs/2;
  const vx=bx2-ax, vy=by2-ay;
  const len=Math.max(1,Math.hypot(vx,vy));
  const ux=vx/len, uy=vy/len;
  const px=-uy, py=ux;
  const sx=ax+ux*cs*0.26, sy=ay+uy*cs*0.26;
  const ex=bx2-ux*cs*0.24, ey=by2-uy*cs*0.24;
  ctx.strokeStyle="rgba(155,115,210,.9)";
  ctx.fillStyle="rgba(155,115,210,.9)";
  ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(sx,sy);
  ctx.lineTo(ex,ey);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx2-ux*cs*0.16,by2-uy*cs*0.16);
  ctx.lineTo(bx2-ux*cs*0.34+px*cs*0.13,by2-uy*cs*0.34+py*cs*0.13);
  ctx.lineTo(bx2-ux*cs*0.34-px*cs*0.13,by2-uy*cs*0.34-py*cs*0.13);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;
  const bubbleY=Math.max(78,by-cs*0.82);
  ctx.fillStyle="rgba(255,255,255,.92)";
  rounded(bx+12,bubbleY,cs*COLS-24,34,17);
  ctx.fill();
  ctx.fillStyle="#9b6fc9";
  ctx.font="bold 15px sans-serif";
  ctx.textAlign="center";
  ctx.fillText(message, bx+cs*COLS/2, bubbleY+22);
  ctx.restore();
}

function drawGameBackground(){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,"#ffd5ea");
  sky.addColorStop(0.46,"#dfdcff");
  sky.addColorStop(1,"#c9f1dc");
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.globalAlpha=0.24;
  const glow=ctx.createRadialGradient(W*0.5,H*0.45,10,W*0.5,H*0.45,Math.max(W,H)*0.58);
  glow.addColorStop(0,"#fff3fc");
  glow.addColorStop(0.48,"#dff5ff");
  glow.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle=glow;
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  function cloud(x,y,s,a){
    ctx.save();
    ctx.globalAlpha=a;
    ctx.fillStyle="#fff";
    ctx.shadowColor="rgba(170,140,210,.18)";
    ctx.shadowBlur=s*0.25;
    ctx.beginPath();
    ctx.arc(x-s*0.42,y+s*0.08,s*0.28,0,7);
    ctx.arc(x-s*0.18,y-s*0.08,s*0.36,0,7);
    ctx.arc(x+s*0.18,y-s*0.1,s*0.34,0,7);
    ctx.arc(x+s*0.42,y+s*0.08,s*0.25,0,7);
    ctx.rect(x-s*0.52,y+s*0.02,s*1.04,s*0.28);
    ctx.fill();
    ctx.restore();
  }
  cloud(W*0.12,H*0.13,54,0.72);
  cloud(W*0.68,H*0.08,38,0.62);
  cloud(W*0.88,H*0.2,44,0.58);

  const floorY=Math.max(by+cs*ROWS+28,H*0.7);
  ctx.save();
  ctx.globalAlpha=0.12;
  ctx.strokeStyle="#ffffff";
  ctx.lineWidth=1;
  for(let y=floorY;y<H+30;y+=26){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(W,y);
    ctx.stroke();
  }
  for(let x=(W%64)-64;x<W+64;x+=64){
    ctx.beginPath();
    ctx.moveTo(x,floorY);
    ctx.lineTo(x+(W*0.22),H);
    ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.globalAlpha=0.22;
  for(let i=0;i<18;i++){
    const x=(i*97+37)%Math.max(W,1);
    const y=42+((i*53)%Math.max(1,Math.min(H*0.48,360)));
    const s=1.4+(i%3)*0.7;
    ctx.fillStyle=i%2?"#ffffff":"#fff7bd";
    ctx.beginPath();
    ctx.arc(x,y,s,0,7);
    ctx.fill();
  }
  ctx.restore();
}

let perf=0, lastTime=performance.now();
function frame(now){
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime=now; perf=now/1000;
  update(dt);
  render();
  requestAnimationFrame(frame);
}

function update(dt){
  if(shakeT>0) shakeT-=dt;
  if(state==="paused") return;
  if(!practiceMode && state!=="title" && state!=="over" && state!=="practiceDone"){
    const before=Math.ceil(timeLeft);
    timeLeft=Math.max(0,timeLeft-dt);
    if(Math.ceil(timeLeft)!==before) updateHUD();
    if(timeLeft<=0){
      updateHUD();
      gameOver();
      return;
    }
  }
  // Particles.
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=600*dt; p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.y-=40*dt; f.life-=dt;
    if(f.life<=0) floats.splice(i,1);
  }
  // Decay tile pop animation.
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t=board[r]&&board[r][c];
    if(t&&t.pop>0) t.pop=Math.max(0,t.pop-dt*1.6);
  }

  if(state==="swap"||state==="swapback"){
    swapInfo.t += dt/SWAP_T;
    if(swapInfo.t>=1){
      if(state==="swap") commitSwap();
      else { state="idle"; swapInfo=null; registerMiss(); }
    }
  }
  else if(state==="clear"){
    clearTimer += dt;
    const k = Math.min(clearTimer/CLEAR_T,1);
    for(const key of clearSet){
      const [r,c]=key.split(",").map(Number);
      if(board[r][c]) board[r][c].scale = 1-k;
    }
    if(k>=1) finishClear();
  }
  else if(state==="fall"){
    let settled=true;
    for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
      const t=board[r][c];
      if(!t||t.offY>=0) continue;
      t.vy += GRAV*dt;
      t.offY += t.vy*dt;
      if(t.offY>=0){ t.offY=0; t.vy=0; t.pop=0.12; }
      else settled=false;
    }
    if(settled) afterFall();
  }
  else if(state==="idle"){
    idleTime+=dt;
    if(idleTime>5 && !hint){ hint=findAnyMove(); }
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shakeT>0){
    const shake=Math.min(10,5+shakeT*18);
    ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  }

  const drawState = state==="paused" ? (pausedState || "idle") : state;
  if(drawState==="title"){ ctx.restore(); return; }
  drawGameBackground();
  // Board panel.
  ctx.save();
  ctx.shadowColor="rgba(126,98,168,.2)";
  ctx.shadowBlur=22;
  ctx.shadowOffsetY=6;
  ctx.fillStyle="rgba(255,255,255,.8)";
  rounded(bx-8,by-8,cs*COLS+16,cs*ROWS+16,20); ctx.fill();
  ctx.restore();
  ctx.strokeStyle="rgba(255,255,255,1)"; ctx.lineWidth=4;
  rounded(bx-8,by-8,cs*COLS+16,cs*ROWS+16,20); ctx.stroke();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.fillStyle = (r+c)%2? "rgba(255,255,255,.64)":"rgba(250,244,255,.62)";
    rounded(bx+c*cs+1.5,by+r*cs+1.5,cs-3,cs-3,8); ctx.fill();
  }

  // Clip drawing to the board.
  ctx.save();
  rounded(bx-8,by-8,cs*COLS+16,cs*ROWS+16,20); ctx.clip();

  const skip = new Set();
  if((drawState==="swap"||drawState==="swapback") && swapInfo){
    skip.add(swapInfo.r1+","+swapInfo.c1);
    skip.add(swapInfo.r2+","+swapInfo.c2);
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t=board[r][c];
    if(!t||skip.has(r+","+c)) continue;
    let ex=1;
    if(selected && selected[0]===r && selected[1]===c) ex = 1.12+0.05*Math.sin(perf*8);
    if(hint && ((hint[0]===r&&hint[1]===c)||(hint[2]===r&&hint[3]===c))) ex = 1+0.08*Math.sin(perf*5);
    drawTile(r,c,t, bx+c*cs, by+r*cs+t.offY, ex);
  }
  if((drawState==="swap"||drawState==="swapback") && swapInfo){
    const {r1,c1,r2,c2}=swapInfo;
    let k=Math.min(swapInfo.t,1);
    k = k*k*(3-2*k);
    if(drawState==="swapback") k = 1-k;
    const x1=bx+c1*cs, y1=by+r1*cs, x2=bx+c2*cs, y2=by+r2*cs;
    const a=board[r1][c1], b=board[r2][c2];
    // Before commitSwap, a is still at the first cell and moves toward the second.
    if(b) drawTile(r2,c2,b, x2+(x1-x2)*k, y2+(y1-y2)*k);
    if(a) drawTile(r1,c1,a, x1+(x2-x1)*k, y1+(y2-y1)*k);
  }
  ctx.restore();
  drawPracticeGuide();

  // Particles.
  for(const p of particles){
    ctx.globalAlpha = Math.min(1,p.life*2.2);
    ctx.fillStyle = p.col;
    if(p.heart){
      ctx.save(); ctx.translate(p.x,p.y); ctx.scale(p.r/4,p.r/4);
      ctx.beginPath();
      ctx.moveTo(0,2); ctx.bezierCurveTo(-4,-2,-1.5,-5,0,-2.2);
      ctx.bezierCurveTo(1.5,-5,4,-2,0,2); ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  for(const f of floats){
    ctx.globalAlpha = Math.min(1,f.life*1.6);
    ctx.font = "bold "+f.size+"px sans-serif";
    ctx.textAlign="center";
    ctx.lineWidth=5; ctx.strokeStyle="#fff";
    ctx.strokeText(f.txt,f.x,f.y);
    ctx.fillStyle=f.color;
    ctx.fillText(f.txt,f.x,f.y);
  }
  ctx.globalAlpha=1;

  // Goal progress gauge.
  const gw = cs*COLS, gx=bx, gy=by+cs*ROWS+12;
  ctx.fillStyle="rgba(255,255,255,.6)";
  rounded(gx,gy,gw,8,4); ctx.fill();
  ctx.fillStyle="#ff9ec9";
  rounded(gx,gy,gw*Math.min(score/target,1),8,4); ctx.fill();

  ctx.restore();
}

requestAnimationFrame(frame);

// Debug: ?autostart skips the title, &horror forces horror mode.
if(location.search.indexOf("autostart")>=0) document.getElementById("btn-start").click();
if(location.search.indexOf("horror")>=0){ misses=1; horror=true; }
</script>
